<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Community Clean-Ups</title>
        <style>

            body{
                font-family: 'Courier New', Courier, monospace;
                margin: 0;
                background: #f5f5f5;
            }

            header{
                background: #004d29;
                color: white;
                text-align: center;
                padding: 30px;
            }

            .gallery{
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
                gap: 20px;
                padding: 40px;
            }

            .gallery img{
                width: 100%;
                height: 300px;
                object-fit: cover;
                border-radius: 10px;
            }

            .gallery img:hover{
                transform: scale(1.03);
                transition: 0.3s;
            }

            .back{
                display: inline-block;
                margin: 20px;
                background: #3b9d2f;
                color: white;
                text-decoration: none;
                padding: 12px 25px;
                border-radius: 8px;
            }

        </style>
    </head>
